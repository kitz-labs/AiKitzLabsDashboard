services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitz-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./ops/docker/kitz-dashboard.env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      KITZ_DB_PATH: /data/kitz.db
      KITZ_STATE_DIR: /data/state
      KITZ_CODING_STORAGE_DIR: /data/state/coding
    volumes:
      - kitz-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  kitz-data:
